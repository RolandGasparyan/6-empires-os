<svg width="240" height="280" viewBox="0 0 240 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="6 EMPIRE">
  <defs>
    <linearGradient id="eg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9A7B2E"/>
      <stop offset="0.35" stop-color="#D4AF37"/>
      <stop offset="0.5" stop-color="#F4D98B"/>
      <stop offset="0.65" stop-color="#D4AF37"/>
      <stop offset="1" stop-color="#9A7B2E"/>
    </linearGradient>
    <radialGradient id="star" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFF3C4"/>
      <stop offset="0.5" stop-color="#F4D98B"/>
      <stop offset="1" stop-color="#9A7B2E"/>
    </radialGradient>
    <filter id="gl" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- four interlocking 6-strokes in rotational symmetry around center -->
  <g filter="url(#gl)" stroke="url(#eg)" stroke-width="13" stroke-linecap="round" fill="none">
    <g>
      <path d="M120 116 C120 70 150 44 176 52 C150 58 142 84 142 116 C142 140 130 150 120 150"/>
      <path d="M124 120 C170 120 196 150 188 176 C182 150 156 142 124 142 C100 142 90 130 90 120"/>
      <path d="M120 124 C120 170 90 196 64 188 C90 182 98 156 98 124 C98 100 110 90 120 90"/>
      <path d="M116 120 C70 120 44 90 52 64 C58 90 84 98 116 98 C140 98 150 110 150 120"/>
    </g>
  </g>
  <!-- central 4-point star -->
  <path d="M120 96 L128 120 L120 144 L112 120 Z M96 120 L120 112 L144 120 L120 128 Z" fill="url(#star)"/>
  <circle cx="120" cy="120" r="3.2" fill="#FFF8E1"/>
  <!-- EMPIRE wordmark -->
  <text x="120" y="232" text-anchor="middle" font-family="'Cinzel','Trajan Pro',serif" font-size="34" letter-spacing="9" fill="url(#eg)" font-weight="600">EMPIRE</text>
  <g stroke="url(#eg)" stroke-width="1.2">
    <line x1="46" y1="248" x2="108" y2="248"/>
    <line x1="132" y1="248" x2="194" y2="248"/>
  </g>
  <path d="M120 242 l5 6 l-5 6 l-5 -6 Z" fill="url(#star)"/>
  <text x="120" y="270" text-anchor="middle" font-family="'Cinzel',serif" font-size="11" letter-spacing="6" fill="#C9A24B">6-EMPIRE</text>
</svg>

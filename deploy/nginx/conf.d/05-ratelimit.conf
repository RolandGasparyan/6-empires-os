# Rate-limit zones (http context). Keyed by client IP.
#  auth_zone:    login/register/refresh — tight, brute-force protection
#  cmd_zone:     agent commands — moderate
#  api_zone:     general API — generous
limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=cmd_zone:10m  rate=30r/m;
limit_req_zone $binary_remote_addr zone=api_zone:10m  rate=120r/m;
limit_req_status 429;

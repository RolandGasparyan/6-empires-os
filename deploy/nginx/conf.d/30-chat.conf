server {
    listen 443 ssl;
    http2 on;
    server_name chat.6-empires.com;

    ssl_certificate     /etc/letsencrypt/live/6-empires.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/6-empires.com/privkey.pem;
    include /etc/nginx/conf.d/ssl-params.inc;

    location / {
        proxy_pass http://web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name api.6-empires.com;

    ssl_certificate     /etc/letsencrypt/live/6-empires.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/6-empires.com/privkey.pem;
    include /etc/nginx/conf.d/ssl-params.inc;

    # Brute-force protection on auth endpoints (5/min, small burst).
    location ~ ^/api/v1/auth/(login|register|refresh) {
        limit_req zone=auth_zone burst=5 nodelay;
        proxy_pass http://api:8000;
        include /etc/nginx/conf.d/proxy-common.inc;
    }

    # Agent commands — moderate (30/min).
    location ~ ^/api/v1/agents/.+/command {
        limit_req zone=cmd_zone burst=10 nodelay;
        proxy_pass http://api:8000;
        include /etc/nginx/conf.d/proxy-common.inc;
    }

    # Metrics — internal only. Allow private ranges, deny public.
    location /metrics {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://api:8000;
        include /etc/nginx/conf.d/proxy-common.inc;
    }

    # Everything else — generous general limit + WebSocket upgrade.
    location / {
        limit_req zone=api_zone burst=40 nodelay;
        proxy_pass http://api:8000;
        include /etc/nginx/conf.d/proxy-common.inc;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }
}

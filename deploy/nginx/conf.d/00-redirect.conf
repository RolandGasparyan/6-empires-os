# ACME HTTP-01 challenge for all domains, then redirect everything to HTTPS.
server {
    listen 80;
    server_name 6-empires.com www.6-empires.com api.6-empires.com chat.6-empires.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

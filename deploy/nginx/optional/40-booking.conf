# Booking reverse proxy — booking.6-empires.com → host booking app (:5000).
#
# NOT loaded directly. deploy-release.sh copies this into conf.d/ only after it
# has confirmed a live cert for booking.6-empires.com, so a missing booking cert
# can never crash-loop nginx and take the whole site down.
server {
    listen 443 ssl;
    http2 on;
    server_name booking.6-empires.com;

    ssl_certificate     /etc/letsencrypt/live/booking.6-empires.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/booking.6-empires.com/privkey.pem;
    include /etc/nginx/conf.d/ssl-params.inc;

    location / {
        proxy_pass http://172.17.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

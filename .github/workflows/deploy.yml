name: Deploy to VPS

on:
  workflow_dispatch:
    inputs:
      deploy_sha:
        description: Exact main-branch commit SHA with a successful 6-EMPIRE CI run
        required: true
        type: string

permissions:
  actions: read
  contents: read

jobs:
  deploy:
    name: SSH deploy → 6-empires.com
    runs-on: ubuntu-latest

    steps:
      - name: Verify release SHA passed CI
        env:
          DEPLOY_SHA: ${{ inputs.deploy_sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          case "$DEPLOY_SHA" in
            *[!0-9a-f]*|'') echo "invalid deploy SHA" >&2; exit 1 ;;
          esac
          conclusion="$(
            gh api --method GET "repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/runs" \
              -f head_sha="$DEPLOY_SHA" -f status=completed -f per_page=10 \
              --jq '.workflow_runs[0].conclusion // ""'
          )"
          [[ "$conclusion" == "success" ]] || {
            echo "refusing deploy: no successful CI run for $DEPLOY_SHA" >&2
            exit 1
          }

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_SHA: ${{ inputs.deploy_sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DEPLOY_SHA
          script: |
            set -euo pipefail
            REPO_DIR="$HOME/6-empires-os"
            cd "$REPO_DIR"

            case "$DEPLOY_SHA" in
              *[!0-9a-f]*|'') echo "invalid deploy SHA" >&2; exit 1 ;;
            esac

            echo "=== $(date) — deploying verified SHA $DEPLOY_SHA ==="
            git fetch origin main
            git cat-file -e "$DEPLOY_SHA^{commit}"
            git merge-base --is-ancestor "$DEPLOY_SHA" origin/main
            git reset --hard "$DEPLOY_SHA"
            bash deploy/scripts/deploy-release.sh "$DEPLOY_SHA"

name: Deploy to VPS

on:
  workflow_run:
    workflows: ["6-EMPIRE CI"]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    name: SSH deploy → 6-empires.com
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DEPLOY_SHA
          script: |
            set -euo pipefail
            REPO_DIR="$HOME/6-empires-os"
            cd "$REPO_DIR"

            case "$DEPLOY_SHA" in
              *[!0-9a-f]*|'') echo "invalid workflow_run head SHA" >&2; exit 1 ;;
            esac

            echo "=== $(date) — deploying verified SHA $DEPLOY_SHA ==="
            git fetch origin main
            git cat-file -e "$DEPLOY_SHA^{commit}"
            git merge-base --is-ancestor "$DEPLOY_SHA" origin/main
            git reset --hard "$DEPLOY_SHA"
            bash deploy/scripts/deploy-release.sh "$DEPLOY_SHA"

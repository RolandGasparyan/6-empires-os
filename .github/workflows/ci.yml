name: 6-EMPIRE CI

on:
  push:
    branches: [ main, "claude/**" ]
  pull_request:
    branches: [ main ]

jobs:
  workflow-security:
    name: Workflows + secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Lint GitHub Actions workflows
        run: docker run --rm -v "$PWD:/repo" -w /repo rhysd/actionlint:1.7.7 -color
      - name: Scan changed history for secrets
        if: github.event_name == 'pull_request'
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  api:
    name: API — lint, types, tests
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/api } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt
      - name: Install deps
        run: pip install -r requirements.txt aiosqlite mypy pip-audit pytest ruff
      - name: Lint
        run: ruff check app main.py --select E9,F63,F7,F82
      - name: Typecheck
        run: >-
          mypy app main.py --ignore-missing-imports --follow-imports=skip
          --disable-error-code valid-type --disable-error-code misc
      - name: Import + compile check
        run: |
          python -m compileall -q app main.py
          ENV=development JWT_SECRET=ci DATABASE_URL="sqlite+aiosqlite:///./ci.db" \
            python -c "from main import app; assert len(app.openapi()['paths'])>=18; print('API OK')"
      - name: Tests
        run: pytest -q
      - name: Audit Python dependencies
        run: pip-audit -r requirements.txt

  web:
    name: Web — types, build
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/web } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Tests
        run: npm test
      - name: Audit Node dependencies
        run: npm audit --audit-level=high
      - name: Build
        run: npm run build
        env: { NEXT_TELEMETRY_DISABLED: "1" }

  images:
    name: Build Docker images
    needs: [workflow-security, api, web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t empire-api:ci apps/api
      - name: Build Web image
        run: docker build -t empire-web:ci apps/web

# Render Blueprint for the deployable web/API core.
# Qdrant and Neo4j are intentionally external: durable image services require
# paid disks plus sizing/licensing decisions. Supply managed endpoints below.
services:
  - type: web
    name: empire-api
    runtime: docker
    plan: free
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    healthCheckPath: /ready
    preDeployCommand: alembic upgrade head
    autoDeployTrigger: "off"
    envVars:
      - key: ENV
        value: production
      - key: PORT
        value: "8000"
      - key: DATABASE_URL
        fromDatabase:
          name: empire-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: empire-redis
          type: keyvalue
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FOUNDER_EMAIL
        value: roland.gasparyan@gmail.com
      - key: FOUNDER_BOOTSTRAP_TOKEN
        generateValue: true
      - key: CORS_ORIGINS
        value: https://empire-web.onrender.com
      - key: QDRANT_URL
        value: ""
      - key: NEO4J_URI
        value: ""
      - key: NEO4J_PASSWORD
        value: ""

  - type: web
    name: empire-web
    runtime: docker
    plan: free
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: ./apps/web
    healthCheckPath: /
    autoDeployTrigger: "off"
    envVars:
      - key: PORT
        value: "3000"
      - key: NEXT_PUBLIC_API_BASE
        value: https://empire-api.onrender.com/api/v1
      - key: NEXT_PUBLIC_WS_URL
        value: wss://empire-api.onrender.com/api/v1/ws/updates
      - key: NEXT_PUBLIC_USE_MOCK
        value: "false"

  - type: keyvalue
    name: empire-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []

databases:
  - name: empire-postgres
    databaseName: empires
    user: empire
    plan: free
    postgresMajorVersion: "16"
    ipAllowList: []

previews:
  generation: "off"

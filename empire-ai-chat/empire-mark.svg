<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="6 EMPIRE">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbe9a8"/>
      <stop offset="0.35" stop-color="#e6b53c"/>
      <stop offset="0.7" stop-color="#b8841f"/>
      <stop offset="1" stop-color="#7a5512"/>
    </linearGradient>
    <linearGradient id="goldHi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff3c4"/>
      <stop offset="1" stop-color="#d4a128"/>
    </linearGradient>
    <radialGradient id="spark" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fffbe6"/>
      <stop offset="0.5" stop-color="#ffd86b"/>
      <stop offset="1" stop-color="#c8941a"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="#000"/>

  <!-- four interlocking "6" arcs forming the gold quatrefoil -->
  <g transform="translate(256 230)" filter="url(#glow)" stroke="url(#gold)" stroke-width="26" stroke-linecap="round" fill="none">
    <path d="M0,-122 A122,122 0 0 1 98,-42 A54,54 0 1 1 14,-80"/>
    <path transform="rotate(90)"  d="M0,-122 A122,122 0 0 1 98,-42 A54,54 0 1 1 14,-80"/>
    <path transform="rotate(180)" d="M0,-122 A122,122 0 0 1 98,-42 A54,54 0 1 1 14,-80"/>
    <path transform="rotate(270)" d="M0,-122 A122,122 0 0 1 98,-42 A54,54 0 1 1 14,-80"/>
  </g>

  <!-- central 4-point star -->
  <g transform="translate(256 230)">
    <path d="M0,-48 L14,0 L0,48 L-14,0 Z" fill="url(#spark)"/>
    <path d="M-48,0 L0,-14 L48,0 L0,14 Z" fill="url(#goldHi)"/>
    <circle r="6" fill="#fffbe6"/>
  </g>

  <!-- wordmark -->
  <text x="256" y="432" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="64" letter-spacing="11" fill="url(#goldHi)" font-weight="700">EMPIRE</text>
  <g stroke="url(#gold)" stroke-width="2">
    <line x1="146" y1="460" x2="232" y2="460"/>
    <line x1="280" y1="460" x2="366" y2="460"/>
  </g>
  <path d="M256,451 l9,9 l-9,9 l-9,-9 Z" fill="url(#spark)"/>
  <text x="256" y="494" text-anchor="middle" font-family="Georgia, serif" font-size="20" letter-spacing="8" fill="#c8a13a">6 - EMPIRE</text>
</svg>

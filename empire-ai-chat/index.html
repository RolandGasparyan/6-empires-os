<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>EMPIRE AI</title>
<style>
  :root{
    --gold:#d4af37; --gold-hi:#f4d98b; --gold-deep:#9a7b2e;
    --bg:#000; --panel:#0c0b09; --ink:#f3ecd9; --muted:#8a8270;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  /* clean solid black background across the whole chat */
  /* clean dark background (no gold shimmer) — transparent logo sits on it */
  body{display:flex;flex-direction:column;height:100dvh;overflow:hidden;
    background:radial-gradient(120% 90% at 50% 38%, #0d0a06 0%, #080603 55%, #030201 100%);}
  .serif{font-family:Georgia,"Times New Roman",serif;}

  /* header */
  header{display:flex;align-items:center;gap:14px;padding:16px 20px;
    border-bottom:1px solid #caa44a33;background:linear-gradient(180deg,rgba(5,4,2,0.82),rgba(5,4,2,0.4));backdrop-filter:blur(3px);}
  .logo{width:54px;height:54px;flex:0 0 auto;display:grid;place-items:center;}
  .logo svg,.logo img{width:50px;height:50px}
  .brand{line-height:1.05;flex:1}
  .brand .t{font-size:22px;letter-spacing:.32em;color:var(--gold);font-weight:600}
  .brand .s{font-size:10px;letter-spacing:.34em;color:var(--gold-deep);margin-top:3px}
  .status{display:flex;align-items:center;gap:8px;font-size:15px;color:#cfcab8}
  .dot{width:11px;height:11px;border-radius:50%;background:#1fd17a;box-shadow:0 0 10px #1fd17a}

  /* chat scroll area */
  main{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth}
  .hero{margin:auto;text-align:center;max-width:560px;padding:30px 16px}
  .hero .mark{width:180px;height:180px;margin:0 auto 6px;display:grid;place-items:center;}
  .hero .mark svg,.hero .mark img{width:170px;height:170px;object-fit:contain}
  .hero h1{font-size:46px;letter-spacing:.22em;margin:18px 0 10px;
    background:linear-gradient(180deg,var(--gold-hi),var(--gold-deep));
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .hero p{color:var(--muted);font-size:19px;margin:0}

  .msg{display:flex;gap:12px;max-width:860px;width:100%;margin:0 auto}
  .msg .av{width:34px;height:34px;border-radius:9px;flex:0 0 auto;display:grid;place-items:center;font-size:12px;font-weight:700}
  .msg.user .av{background:#181511;border:1px solid #ffffff12;color:var(--muted)}
  .msg.ai .av{background:#181307;border:1px solid var(--gold-deep);color:var(--gold)}
  .bubble{padding:12px 15px;border-radius:14px;font-size:15.5px;line-height:1.55;white-space:pre-wrap;word-wrap:break-word}
  .msg.user .bubble{background:#101010;border:1px solid #ffffff10;color:#efe9da}
  .msg.ai .bubble{background:#0a0a0a;border:1px solid #caa44a40;color:#f3ecd9}
  .bubble .cursor{display:inline-block;width:7px;height:16px;background:var(--gold);margin-left:2px;animation:blink 1s steps(2) infinite;vertical-align:middle}
  @keyframes blink{50%{opacity:0}}

  /* composer */
  footer{padding:14px 16px calc(14px + env(safe-area-inset-bottom));border-top:1px solid #caa44a33;background:linear-gradient(0deg,rgba(5,4,2,0.82),rgba(5,4,2,0.35));backdrop-filter:blur(3px)}
  .composer{display:flex;align-items:flex-end;gap:10px;max-width:880px;margin:0 auto;
    background:#0c0c0c;border:1px solid #caa44a30;border-radius:20px;padding:10px 10px 10px 18px;}
  .composer textarea{flex:1;background:transparent;border:0;outline:0;color:var(--ink);
    font-size:17px;resize:none;max-height:140px;line-height:1.4;padding:8px 0;font-family:inherit}
  .composer textarea::placeholder{color:#6f6857}
  .send{width:54px;height:50px;border:0;border-radius:14px;flex:0 0 auto;cursor:pointer;
    background:linear-gradient(135deg,var(--gold-hi),var(--gold-deep));
    display:grid;place-items:center;transition:opacity .15s ease}
  .send:hover{opacity:.9}
  .send:disabled{opacity:.5;cursor:default;transform:none}
  .send svg{width:24px;height:24px}
  .mic,.speaker{width:42px;height:42px;flex:0 0 auto;border:0;border-radius:12px;cursor:pointer;
    background:#161310;color:var(--gold);display:grid;place-items:center;transition:all .15s ease}
  .mic svg,.speaker svg{width:21px;height:21px}
  .mic:hover,.speaker:hover{background:#211c12;color:var(--gold-hi)}
  .mic.live{background:linear-gradient(135deg,#e23b3b,#9a1f1f);color:#fff;animation:pulse 1s ease-in-out infinite}
  .speaker.on{background:linear-gradient(135deg,var(--gold-hi),var(--gold-deep));color:#0a0a0b}
  @keyframes pulse{50%{box-shadow:0 0 0 6px rgba(226,59,59,.25)}}
  .modelbar{max-width:880px;margin:0 auto 8px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
  .modelbar select{background:#0e0d0a;color:var(--gold);border:1px solid var(--gold-deep);border-radius:8px;padding:4px 8px;font-size:12px}
</style>
</head>
<body>
  <header>
    <div class="logo"><img src="empire-logo.png?v=4" alt="6 Empire" width="46" height="46" style="object-fit:contain" /></div>
    <div class="brand">
      <div class="t serif">EMPIRE</div>
      <div class="s">6 · EMPIRE AI</div>
    </div>
    <div class="status"><span class="dot" id="dot"></span><span id="statusText">Online</span></div>
  </header>

  <main id="main">
    <div class="hero" id="hero">
      <div class="mark"><img src="empire-logo.png?v=4" alt="6 Empire" width="150" height="150" style="object-fit:contain" /></div>
      <h1 class="serif">EMPIRE AI</h1>
      <p>Your intelligent assistant. Ask anything to begin.</p>
    </div>
  </main>

  <footer>
    <div class="modelbar"><span>Model:</span>
      <select id="model"><option>loading…</option></select>
      <span style="margin-left:10px">Mode:</span>
      <select id="mode" title="EMPIRE prompt mode">
        <option value="empire">👑 EMPIRE CORE</option>
        <option value="god">⚡ GOD MODE</option>
        <option value="academic">🎓 Academic / Research</option>
        <option value="trading">📈 Markets / Trading</option>
        <option value="builder">🛠️ Systems / Engineering</option>
      </select>
    </div>
    <div class="composer">
      <button class="mic" id="mic" title="Speak (voice)">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 15a3 3 0 0 0 3-3V7a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M19 11a7 7 0 0 1-14 0M12 18v3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <textarea id="input" rows="1" placeholder="Message Empire AI…"></textarea>
      <button class="speaker" id="speaker" title="Speak replies aloud (toggle)">
        <svg viewBox="0 0 24 24" fill="none"><path d="M11 5 6 9H3v6h3l5 4V5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M15.5 8.5a5 5 0 0 1 0 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <button class="send" id="send" title="Send">
        <svg viewBox="0 0 24 24" fill="none"><path d="M4 12h14M12 5l7 7-7 7" stroke="#0a0a0b" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </footer>

<script>
// API base = current directory, so it works at "/" or "/chat" (with or without trailing slash)
const BASE=(location.pathname.replace(/\/[^/]*$/,'')+'/').replace(/\/+$/,'/');
const api=(p)=>BASE.replace(/\/$/,'')+p;

const main=document.getElementById('main'), hero=document.getElementById('hero');
const input=document.getElementById('input'), send=document.getElementById('send');
const modelSel=document.getElementById('model'), modeSel=document.getElementById('mode'), dot=document.getElementById('dot'), statusText=document.getElementById('statusText');
const history=[];

// auto-grow textarea
input.addEventListener('input',()=>{input.style.height='auto';input.style.height=Math.min(input.scrollHeight,140)+'px';});
input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();submit();}});
send.addEventListener('click',submit);

async function loadModels(){
  try{
    const r=await fetch(api('/api/health')); const j=await r.json();
    if(j.ok&&j.models.length){
      modelSel.innerHTML=j.models.map(m=>`<option>${m}</option>`).join('');
      dot.style.background='#1fd17a';statusText.textContent='Online';
    }else{
      modelSel.innerHTML='<option>no models</option>';
      dot.style.background='#e0a92e';statusText.textContent='No model';
    }
  }catch{ dot.style.background='#e04e4e';statusText.textContent='Offline'; modelSel.innerHTML='<option>offline</option>'; }
}
loadModels();

function bubble(role,text){
  if(hero) {hero.remove();}
  const wrap=document.createElement('div');wrap.className='msg '+role;
  wrap.innerHTML=`<div class="av">${role==='user'?'You':'AI'}</div><div class="bubble"></div>`;
  wrap.querySelector('.bubble').textContent=text;
  main.appendChild(wrap);main.scrollTop=main.scrollHeight;
  return wrap.querySelector('.bubble');
}

async function submit(){
  const text=input.value.trim(); if(!text) return;
  input.value='';input.style.height='auto';send.disabled=true;
  bubble('user',text); history.push({role:'user',content:text});
  const out=bubble('ai',''); out.innerHTML='<span class="cursor"></span>';
  let acc='';
  try{
    const res=await fetch(api('/api/chat'),{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:modelSel.value,mode:modeSel.value,messages:history})});
    const reader=res.body.getReader(); const dec=new TextDecoder();
    while(true){const{done,value}=await reader.read();if(done)break;
      acc+=dec.decode(value,{stream:true}); out.textContent=acc; out.innerHTML=out.textContent+'<span class="cursor"></span>';
      main.scrollTop=main.scrollHeight;}
    out.textContent=acc||'(no response)'; history.push({role:'assistant',content:acc});
  }catch(e){ out.textContent='⚠️ '+e.message; }
  send.disabled=false; input.focus();
  if(speakOn && acc) speak(acc);
}

/* ===== EMPIRE VOICE (browser-native, free, offline-capable STT/TTS) ===== */
const micBtn=document.getElementById('mic'), speakerBtn=document.getElementById('speaker');
let speakOn=false, recog=null, listening=false;

// --- TTS (Speech Synthesis) ---
function pickVoice(){
  const vs=speechSynthesis.getVoices();
  // prefer a deep/clear English voice for the EMPIRE persona
  return vs.find(v=>/Daniel|Google UK English Male|Microsoft Guy|Alex/i.test(v.name))
      || vs.find(v=>/en[-_]/i.test(v.lang)) || vs[0];
}
function speak(text){
  if(!('speechSynthesis' in window))return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text.replace(/[*#`>_]/g,''));
  const v=pickVoice(); if(v)u.voice=v;
  u.rate=1.02; u.pitch=0.95; u.volume=1;
  speechSynthesis.speak(u);
}
if('speechSynthesis' in window){ speechSynthesis.onvoiceschanged=pickVoice; }
speakerBtn.addEventListener('click',()=>{
  speakOn=!speakOn; speakerBtn.classList.toggle('on',speakOn);
  if(!speakOn) speechSynthesis.cancel();
  speakerBtn.title = speakOn ? 'Voice replies ON — tap to mute' : 'Speak replies aloud (toggle)';
});

// --- STT (Speech Recognition) ---
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(SR){
  recog=new SR(); recog.lang='en-US'; recog.interimResults=true; recog.continuous=false;
  let finalTx='';
  recog.onstart=()=>{listening=true;micBtn.classList.add('live');finalTx='';};
  recog.onresult=(e)=>{
    let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const t=e.results[i][0].transcript;
      if(e.results[i].isFinal)finalTx+=t; else interim+=t;
    }
    input.value=(finalTx+interim).trim();
    input.style.height='auto';input.style.height=Math.min(input.scrollHeight,140)+'px';
  };
  recog.onerror=()=>{listening=false;micBtn.classList.remove('live');};
  recog.onend=()=>{
    listening=false;micBtn.classList.remove('live');
    if(input.value.trim()){ speakOn=true; speakerBtn.classList.add('on'); submit(); } // voice in → voice out
  };
  micBtn.addEventListener('click',()=>{
    if(listening){recog.stop();return;}
    try{ speechSynthesis.cancel(); recog.start(); }catch(_){}
  });
}else{
  micBtn.title='Voice input not supported in this browser — use Chrome/Edge';
  micBtn.style.opacity='.4';
}
</script>
</body>
</html>

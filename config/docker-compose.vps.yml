# VPS side-by-side deploy of the VERIFIED build, behind the existing HOST nginx.
# Runs on non-conflicting host ports (web 3010, api 8010) so the current live
# stack keeps serving until we flip host-nginx proxy_pass. Reuses the existing
# datastores already running on the host (postgres/redis/qdrant/neo4j) via
# host networking targets, OR brings its own — here we bring our own to stay
# isolated and avoid touching the old stack's data.
services:
  empire_pg:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: empire
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: empires
    volumes: ["empire_pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U empire -d empires"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [empire_v2]

  empire_redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes: ["empire_redisdata:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [empire_v2]

  empire_api:
    build: { context: ../apps/api, dockerfile: Dockerfile }
    restart: unless-stopped
    environment:
      ENV: production
      DATABASE_URL: postgresql+asyncpg://empire:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@empire_pg:5432/empires
      REDIS_URL: redis://empire_redis:6379/0
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      FOUNDER_EMAIL: roland.gasparyan@gmail.com
      FOUNDER_BOOTSTRAP_TOKEN: ${FOUNDER_BOOTSTRAP_TOKEN:?set FOUNDER_BOOTSTRAP_TOKEN}
      CORS_ORIGINS: https://6-empires.com,https://www.6-empires.com
    ports: ["127.0.0.1:8010:8000"]
    depends_on:
      empire_pg: { condition: service_healthy }
      empire_redis: { condition: service_healthy }
    networks: [empire_v2]

  empire_web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: https://6-empires.com/api/v1
        NEXT_PUBLIC_WS_URL: wss://6-empires.com/api/v1/ws/updates
        NEXT_PUBLIC_USE_MOCK: "false"
    restart: unless-stopped
    ports: ["127.0.0.1:3010:3000"]
    depends_on: [empire_api]
    networks: [empire_v2]

volumes:
  empire_pgdata: {}
  empire_redisdata: {}

networks:
  empire_v2: {}

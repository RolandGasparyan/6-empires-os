services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-empire}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-empires}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-empire} -d ${POSTGRES_DB:-empires}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [empire]

  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [empire]

  qdrant:
    image: qdrant/qdrant
    restart: unless-stopped
    volumes:
      - qdrantdata:/qdrant/storage
    networks: [empire]

  neo4j:
    image: neo4j:5
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:?set in .env}
    volumes:
      - neo4jdata:/data
    networks: [empire]

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ../.env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request;urllib.request.urlopen(\"http://localhost:8000/ready\")'"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [empire]

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* are inlined at BUILD time — must be build args, not just
      # runtime env, or the production bundle ships pointing at the wrong host /
      # mock data (same bug fixed locally). The api subdomain uses HTTPS/WSS.
      args:
        NEXT_PUBLIC_API_BASE: https://api.6-empires.com/api/v1
        NEXT_PUBLIC_WS_URL: wss://api.6-empires.com/api/v1/ws/updates
        NEXT_PUBLIC_USE_MOCK: "false"
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE: https://api.6-empires.com/api/v1
      NEXT_PUBLIC_WS_URL: wss://api.6-empires.com/api/v1/ws/updates
      NEXT_PUBLIC_USE_MOCK: "false"
    depends_on: [api]
    networks: [empire]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports: ["80:80", "443:443"]
    volumes:
      - ../deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - certbotconf:/etc/letsencrypt
      - certbotwww:/var/www/certbot
    depends_on: [web, api]
    networks: [empire]

  certbot:
    image: certbot/certbot
    volumes:
      - certbotconf:/etc/letsencrypt
      - certbotwww:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"
    networks: [empire]

volumes:
  pgdata: {}
  redisdata: {}
  qdrantdata: {}
  neo4jdata: {}
  certbotconf: {}
  certbotwww: {}

networks:
  empire: {}
